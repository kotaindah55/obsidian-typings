name: Publish
on:
    workflow_dispatch:
    push:
        tags:
            - '*'
jobs:
    build:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            -   uses: actions/checkout@v4
            -   uses: actions/setup-node@v3
                with:
                    node-version: '20.x'
                    registry-url: 'https://registry.npmjs.org'
            -   uses: oven-sh/setup-bun@v1
                with:
                    bun-version: latest

            -   name: Create Build
                id: build
                run: |
                    bun install --frozen-lockfile
                    bun run build
